<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>簡易會員註冊表單</title>
    <!-- 引入 Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* 稍微自訂一下背景顏色 */
        body {
            background-color: #f8f9fa;
        }
        /* 設定卡片的最大寬度，讓它在電腦版上不會太寬 */
        .form-container {
            max-width: 500px;
            width: 100%;
        }
    </style>
</head>
<!-- 使用 d-flex, align-items-center, min-vh-100 讓表單在整個螢幕垂直/水平居中 -->
<body class="d-flex align-items-center justify-content-center min-vh-100">

    <div class="form-container">
        <!-- 使用 Bootstrap 卡片組件 -->
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-5">
                <h2 class="text-center mb-4 text-primary fw-bold">建立新帳號</h2>
                
                <!-- 表單開始 -->
                <form id="registrationForm">
                    
                    <!-- 姓名欄位 -->
                    <div class="mb-3">
                        <label for="inputName" class="form-label text-secondary">姓名</label>
                        <input type="text" class="form-control form-control-lg" id="inputName" placeholder="請輸入您的姓名" required>
                    </div>

                    <!-- 電子郵件欄位 -->
                    <div class="mb-3">
                        <label for="inputEmail" class="form-label text-secondary">電子郵件</label>
                        <input type="email" class="form-control form-control-lg" id="inputEmail" placeholder="name@example.com" required>
                    </div>

                    <!-- 密碼欄位 -->
                    <div class="mb-3">
                        <label for="inputPassword" class="form-label text-secondary">密碼</label>
                        <input type="password" class="form-control form-control-lg" id="inputPassword" placeholder="請輸入6位數以上密碼" required minlength="6">
                    </div>

                    <!-- 性別下拉選單 -->
                    <div class="mb-4">
                        <label for="selectGender" class="form-label text-secondary">性別</label>
                        <select class="form-select form-select-lg" id="selectGender" required>
                            <option value="" selected disabled>請選擇性別...</option>
                            <option value="male">男性</option>
                            <option value="female">女性</option>
                            <option value="other">其他</option>
                            <option value="secret">不願透露</option>
                        </select>
                    </div>

                    <!-- 同意條款 Checkbox -->
                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input" id="checkTerms" required>
                        <label class="form-check-label text-secondary" for="checkTerms">
                            我已閱讀並同意 <a href="#" class="text-decoration-none">服務條款</a> 與 <a href="#" class="text-decoration-none">隱私權政策</a>
                        </label>
                    </div>

                    <!-- 提交按鈕 -->
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill fw-bold">立即註冊</button>
                    </div>

                </form>
                
                <div class="text-center mt-4">
                    <p class="text-muted mb-0">已經有帳號了嗎？ <a href="#" class="text-decoration-none fw-bold">登入</a></p>
                </div>
            </div>
        </div>
    </div>

    <!-- 引入 Bootstrap 5 JS Bundle CDN (包含 Popper，用於下拉選單等互動元件) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- 簡易的表單提交驗證提示 -->
    <script>
        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault(); // 阻止表單預設的重整行為
            
            // 這裡可以加入送出資料到後端的邏輯
            // 現在我們只是顯示一個成功訊息
            const btn = this.querySelector('button[type="submit"]');
            btn.textContent = '註冊成功！';
            btn.classList.remove('btn-primary');
            btn.classList.add('btn-success');
            
            setTimeout(() => {
                btn.textContent = '立即註冊';
                btn.classList.remove('btn-success');
                btn.classList.add('btn-primary');
                this.reset(); // 清空表單
            }, 3000);
        });
    </script>
</body>
</html>
